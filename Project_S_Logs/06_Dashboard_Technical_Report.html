<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project S — Dashboard Interface (Static Mirror)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <style>
    :root {
      --accent: #d4e157;
      --bg: #0a0a0a;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: #f5f5f7;
      margin: 0;
      overflow-x: hidden;
    }
    .glass {
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(120%);
      -webkit-backdrop-filter: blur(20px) saturate(120%);
      border: 1px solid var(--glass-border);
    }
    /* Aurora Background */
    @keyframes aurora {
      0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
      25% { transform: translate(3%, 3%) rotate(1deg) scale(1.02); }
      50% { transform: translate(-2%, 5%) rotate(-0.5deg) scale(0.98); }
      75% { transform: translate(5%, -3%) rotate(1.5deg) scale(1.01); }
    }
    .aurora-blob { animation: aurora 25s ease-in-out infinite; filter: blur(100px); mix-blend-mode: screen; }
    
    /* Scroll Transitions */
    #welcome-section { transition: opacity 0.2s ease-out, transform 0.2s ease-out; }
    #monitor-section { transition: opacity 0.3s ease-out, transform 0.3s ease-out; }
    
    /* Navigation */
    .nav-btn.active { background-color: var(--accent); color: #0a0a0a; box-shadow: 0 10px 15px -3px rgba(212, 225, 87, 0.2); }
    .nav-btn:not(.active) { color: rgba(255, 255, 255, 0.5); }
    .nav-btn:not(.active):hover { background-color: rgba(255, 255, 255, 0.06); color: rgba(255, 255, 255, 0.8); }

    .hidden { display: none; }
  </style>
</head>
<body class="bg-[#0a0a0a]">

  <!-- ── AURORA BACKGROUND ── -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0" aria-hidden="true">
    <div class="aurora-blob absolute rounded-full opacity-30 w-[60%] h-[60%] -left-[15%] -top-[15%]" style="background: radial-gradient(ellipse, #d4e15740, transparent 70%);"></div>
    <div class="aurora-blob absolute rounded-full opacity-20 w-[50%] h-[50%] -right-[10%] bottom-[10%]" style="background: radial-gradient(ellipse, rgba(34, 211, 238, 0.3), transparent 70%); animation-delay: -12s;"></div>
    <div class="aurora-blob absolute rounded-full opacity-15 w-[40%] h-[40%] left-[40%] -bottom-[10%]" style="background: radial-gradient(ellipse, #d4e15730, transparent 70%); animation-delay: -6s;"></div>
  </div>

  <!-- ── SIDEBAR ── -->
  <aside class="fixed left-4 top-1/2 z-50 flex -translate-y-1/2 flex-col rounded-2xl border border-white/[0.08] bg-black/40 py-3 backdrop-blur-2xl shadow-2xl">
    <div class="flex justify-center px-3 pb-3">
      <div class="flex h-9 w-9 items-center justify-center rounded-xl font-bold text-sm bg-[#d4e157] text-black">S</div>
    </div>
    <div class="mx-3 h-px bg-white/[0.06]"></div>
    <nav class="flex flex-1 flex-col items-center gap-1 px-2 py-3">
      <button onclick="navigate('home')" id="btn-home" class="nav-btn active flex h-9 w-9 items-center justify-center rounded-xl transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
      </button>
      <button onclick="navigate('media')" id="btn-media" class="nav-btn flex h-9 w-9 items-center justify-center rounded-xl transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button onclick="navigate('matrix')" id="btn-matrix" class="nav-btn flex h-9 w-9 items-center justify-center rounded-xl transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button onclick="navigate('vaultwarden')" id="btn-vaultwarden" class="nav-btn flex h-9 w-9 items-center justify-center rounded-xl transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg>
      </button>
      <button onclick="navigate('kiwix')" id="btn-kiwix" class="nav-btn flex h-9 w-9 items-center justify-center rounded-xl transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      </button>
      <div class="my-1 h-px w-4 bg-white/[0.06]"></div>
      <button onclick="window.open('http://localhost:3030')" class="nav-btn flex h-9 w-9 items-center justify-center rounded-xl transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      </button>
    </nav>
  </aside>

  <!-- ── MAIN CONTENT ── -->
  <main class="relative z-10">
    
    <!-- HOME VIEW -->
    <div id="view-home" class="min-h-[200vh]">
      <!-- Welcome Section -->
      <section id="welcome-section" class="fixed inset-0 px-8 py-16 pl-24 flex flex-col justify-center pointer-events-auto">
        <div class="max-w-6xl mx-auto w-full">
          <header class="mb-16">
            <p id="date-display" class="text-sm font-medium tracking-wider text-white/50 mb-2 uppercase">MARCH 28, 2026</p>
            <h1 class="text-6xl font-bold tracking-tight text-white">Good morning!</h1>
          </header>
          
          <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            <!-- Dynamic Apps -->
            <button onclick="navigate('media')" class="group flex items-center gap-3 p-3 rounded-xl transition-all hover:bg-white/[0.04] bg-white/[0.02] border border-white/[0.05]">
              <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-[#d4e157]/10 text-[#d4e157]">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              </div>
              <div class="text-left leading-tight"><p class="text-sm font-semibold">Jellyfin</p><p class="text-[10px] text-white/40 uppercase">Integrated</p></div>
            </button>
            <button onclick="navigate('matrix')" class="group flex items-center gap-3 p-3 rounded-xl transition-all hover:bg-white/[0.04] bg-white/[0.02] border border-white/[0.05]">
              <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-[#d4e157]/10 text-[#d4e157]">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              </div>
              <div class="text-left leading-tight"><p class="text-sm font-semibold">Matrix</p><p class="text-[10px] text-white/40 uppercase">Integrated</p></div>
            </button>
            <button onclick="navigate('vaultwarden')" class="group flex items-center gap-3 p-3 rounded-xl transition-all hover:bg-white/[0.04] bg-white/[0.02] border border-white/[0.05]">
              <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-[#d4e157]/10 text-[#d4e157]">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg>
              </div>
              <div class="text-left leading-tight"><p class="text-sm font-semibold">Vaultwarden</p><p class="text-[10px] text-white/40 uppercase">Integrated</p></div>
            </button>
            <button onclick="navigate('kiwix')" class="group flex items-center gap-3 p-3 rounded-xl transition-all hover:bg-white/[0.04] bg-white/[0.02] border border-white/[0.05]">
              <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-[#d4e157]/10 text-[#d4e157]">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
              </div>
              <div class="text-left leading-tight"><p class="text-sm font-semibold">Kiwix</p><p class="text-[10px] text-white/40 uppercase">Integrated</p></div>
            </button>
          </div>
        </div>
      </section>

      <!-- Monitor Section -->
      <section id="monitor-section" class="relative pt-[100vh] pb-32 px-8 pl-24 opacity-0 pointer-events-none transform translate-y-20">
        <div class="max-w-6xl mx-auto w-full">
          <h2 class="text-3xl font-bold mb-8">System Monitor</h2>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- CPU Card -->
            <div class="p-6 rounded-2xl border border-white/[0.06] bg-white/[0.02] backdrop-blur-xl">
              <div class="flex items-center gap-2 mb-6">
                <svg class="w-4 h-4 text-[#d4e157]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>
                <span class="text-sm font-semibold">CPU Usage</span>
              </div>
              <div class="relative flex items-center justify-center h-40">
                <svg class="w-32 h-32 transform -rotate-90">
                  <circle cx="64" cy="64" r="58" stroke="rgba(255,255,255,0.1)" stroke-width="8" fill="transparent" />
                  <circle cx="64" cy="64" r="58" stroke="#d4e157" stroke-width="8" fill="transparent" stroke-dasharray="364" stroke-dashoffset="182" />
                </svg>
                <div class="absolute inset-0 flex items-center justify-center text-3xl font-bold">52%</div>
              </div>
            </div>
            <!-- Memory Card -->
            <div class="p-6 rounded-2xl border border-white/[0.06] bg-white/[0.02] backdrop-blur-xl">
              <div class="flex items-center gap-2 mb-6">
                <svg class="w-4 h-4 text-cyan-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 19v-3"/><path d="M10 19v-7"/><path d="M14 19v-5"/><path d="M18 19v-8"/><path d="M2 19h20"/></svg>
                <span class="text-sm font-semibold">Memory</span>
              </div>
              <div class="text-4xl font-bold text-cyan-400 mb-2">1.8 GiB</div>
              <p class="text-xs text-white/40 uppercase">Available of 16 GiB</p>
            </div>
            <!-- Storage Card -->
            <div class="p-6 rounded-2xl border border-white/[0.06] bg-white/[0.02] backdrop-blur-xl">
              <div class="flex items-center gap-2 mb-6">
                <svg class="w-4 h-4 text-purple-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h20a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
                <span class="text-sm font-semibold">Disk Space</span>
              </div>
              <div class="space-y-4">
                <div>
                  <div class="flex justify-between text-xs mb-1"><span>/dev/root</span><span class="text-white/40">5%</span></div>
                  <div class="h-1.5 rounded-full bg-white/10 overflow-hidden"><div class="h-full bg-green-500" style="width: 5%"></div></div>
                </div>
                <div>
                  <div class="flex justify-between text-xs mb-1"><span>/user/home</span><span class="text-white/40">50%</span></div>
                  <div class="h-1.5 rounded-full bg-white/10 overflow-hidden"><div class="h-full bg-yellow-500" style="width: 50%"></div></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- PORTAL VIEW -->
    <div id="view-portal" class="hidden fixed inset-0 pl-20 pt-4 pb-4 pr-4 flex flex-col pointer-events-auto">
      <div class="flex-1 w-full rounded-2xl border border-white/[0.06] bg-black/40 backdrop-blur-xl overflow-hidden relative">
        <div id="portal-loader" class="absolute inset-0 flex flex-col items-center justify-center gap-4 bg-black/60 z-20 transition-opacity">
          <svg class="w-8 h-8 animate-spin text-white/20" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          <p class="text-xs text-white/40 uppercase tracking-widest" id="portal-text">Connecting to service...</p>
        </div>
        <iframe id="portal-iframe" src="" class="w-full h-full border-0" allowfullscreen></iframe>
      </div>
    </div>

  </main>

  <script>
    const ports = {
      media: "http://localhost:8096",
      matrix: "http://localhost:8082",
      vaultwarden: "http://localhost:8083",
      kiwix: "http://localhost:8084"
    };

    function navigate(section) {
      const home = document.getElementById('view-home');
      const portal = document.getElementById('view-portal');
      const iframe = document.getElementById('portal-iframe');
      const loader = document.getElementById('portal-loader');
      const portalText = document.getElementById('portal-text');

      // Update Active State
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      const activeBtn = document.getElementById('btn-' + section);
      if (activeBtn) activeBtn.classList.add('active');

      if (section === 'home') {
        home.classList.remove('hidden');
        portal.classList.add('hidden');
        document.body.style.overflow = 'auto';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        home.classList.add('hidden');
        portal.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
        
        loader.style.opacity = '1';
        portalText.innerText = `Connecting to ${section}...`;
        iframe.src = ports[section] || "";
        
        // Hide loader after a bit (since local iframes load fast)
        setTimeout(() => { loader.style.opacity = '0'; }, 800);
      }
    }

    // Date
    document.getElementById('date-display').innerText = new Date().toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
    }).toUpperCase();

    // Scroll Animations
    window.addEventListener('scroll', () => {
      const scrollY = window.scrollY;
      const height = window.innerHeight;
      const progress = Math.min(scrollY / height, 1);

      const welcome = document.getElementById('welcome-section');
      const monitor = document.getElementById('monitor-section');

      if (welcome) {
        welcome.style.opacity = (1 - progress * 1.5).toString();
        welcome.style.transform = `translateY(-${progress * 50}px)`;
        welcome.style.pointerEvents = progress > 0.5 ? 'none' : 'auto';
      }

      if (monitor) {
        if (progress > 0.3) {
          monitor.style.opacity = ((progress - 0.3) / 0.7).toString();
          monitor.style.transform = `translateY(${(1 - progress) * 30}px)`;
          monitor.style.pointerEvents = 'auto';
        } else {
          monitor.style.opacity = '0';
          monitor.style.pointerEvents = 'none';
        }
      }
    });
  </script>
</body>
</html>
