# OpenVPN Client Profile Template — HomeForge
# This template is embedded into generated .ovpn files by openvpn-ui.
# Edit via the UI: http://<host>:8087 → Server → Client Config

client
dev tun
proto udp
remote YOUR_SERVER_IP 1194
resolv-retry infinite
nobind
persist-key
persist-tun
remote-cert-tls server
auth SHA512
cipher AES-256-CBC
verb 3
key-direction 1
