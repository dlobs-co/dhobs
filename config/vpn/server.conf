# OpenVPN Server Configuration — HomeForge seed template
# Managed by: openvpn-ui at http://<host>:8087
# Do not edit this file directly after first run — use the UI instead.

port 1194
proto udp
dev tun

# PKI — paths are inside the container (/etc/openvpn maps to ./data/vpn on host)
ca /etc/openvpn/pki/ca.crt
cert /etc/openvpn/pki/issued/server.crt
key /etc/openvpn/pki/private/server.key
dh /etc/openvpn/pki/dh.pem
auth SHA512
tls-crypt /etc/openvpn/pki/ta.key

topology subnet
server 10.0.70.0 255.255.255.0
ifconfig-pool-persist /etc/openvpn/clients/ipp.txt

# Route all client traffic through the VPN
push "redirect-gateway def1 bypass-dhcp"
push "dhcp-option DNS 8.8.8.8"
push "dhcp-option DNS 8.8.4.4"

keepalive 10 120
cipher AES-256-CBC
user nobody
group nogroup
persist-key
persist-tun

status /var/log/openvpn/openvpn-status.log
log /var/log/openvpn/openvpn.log
verb 3

# Management socket — used by openvpn-ui to communicate with the daemon
management localhost 2080
