version: '3.8'

services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: project-s-jellyfin
    ports:
      - '8096:8096'
    volumes:
      - ./data/jellyfin/config:/config
      - ./data/jellyfin/cache:/cache
      - ./data/media:/media
      - .:/homeforge
    restart: 'unless-stopped'

  dashboard:
    build:
      context: ./Dashboard/Dashboard1
      dockerfile: Dockerfile
    container_name: project-s-dashboard
    user: root
    ports:
      - '3069:3069'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data:ro
    environment:
      - PORT=3069
    restart: 'unless-stopped'
    depends_on:
      - jellyfin
      - nextcloud

  db:
    image: mariadb:10.6
    container_name: project-s-nextcloud-db
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    restart: always
    volumes:
      - ./data/nextcloud/db:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=nextcloud
      - MYSQL_PASSWORD=nextcloud
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud

  nextcloud:
    image: nextcloud:latest
    container_name: project-s-nextcloud
    restart: always
    ports:
      - '8081:80'
    links:
      - db
    volumes:
      - ./data/nextcloud/html:/var/www/html
      - ./data/nextcloud/data:/var/www/nextcloud_data
    environment:
      - MYSQL_PASSWORD=nextcloud
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=db
      - NEXTCLOUD_TRUSTED_DOMAINS=localhost 127.0.0.1 192.168.1.68
      - OVERWRITEHOST=localhost:8081
      - OVERWRITEPROTOCOL=http
      - NEXTCLOUD_DATA_DIR=/var/www/nextcloud_data

  theia:
    image: ghcr.io/eclipse-theia/theia-ide/theia-ide:latest
    container_name: project-s-theia
    user: root
    privileged: true
    ports:
      - '3030:3000'
    volumes:
      - .:/home/project/project-s
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SHELL=/bin/bash
    restart: 'unless-stopped'

  synapse-db:
    image: postgres:15-alpine
    container_name: project-s-matrix-db
    environment:
      - POSTGRES_USER=synapse
      - POSTGRES_PASSWORD=synapse_password
      - POSTGRES_DB=synapse
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - ./data/matrix/db:/var/lib/postgresql/data
    restart: unless-stopped

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: project-s-matrix-server
    depends_on:
      - synapse-db
    ports:
      - '8008:8008'
    volumes:
      - ./data/matrix/synapse:/data
      - ./config/matrix/homeserver.yaml:/data/homeserver.yaml:ro
    restart: unless-stopped

  element:
    image: vectorim/element-web:latest
    container_name: project-s-matrix-client
    ports:
      - '8082:80'
    volumes:
      - ./config/matrix/element-config.json:/app/config.json:ro
    restart: unless-stopped

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: project-s-vaultwarden
    ports:
      - '8083:80'
    volumes:
      - ./data/vaultwarden:/data
    environment:
      - WEBSOCKET_ENABLED=true
      - DATA_FOLDER=/data
    restart: unless-stopped

  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:latest
    container_name: project-s-kiwix-reader
    ports:
      - '8084:80'
    volumes:
      - ./data/kiwix:/data
    command: sh -c "kiwix-serve --port=80 *.zim || (echo 'No ZIM files found. Please add .zim files to ./data/kiwix' && sleep infinity)"
    restart: unless-stopped
