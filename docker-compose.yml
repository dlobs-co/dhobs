services:
  jellyfin:
    image: jellyfin/jellyfin:10.10.6
    container_name: project-s-jellyfin
    ports:
      - '8096:8096'
    volumes:
      - ./data/jellyfin/config:/config
      - ./data/jellyfin/cache:/cache
      - ./data/media:/media
    restart: 'unless-stopped'
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  dashboard:
    build:
      context: ./Dashboard/Dashboard1
      dockerfile: Dockerfile
    container_name: project-s-dashboard
    user: root
    ports:
      - '3069:3069'
      - '3070:3070'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data:ro
    environment:
      - PORT=3069
      - WS_PORT=3070
    restart: 'unless-stopped'
    depends_on:
      - jellyfin
      - nextcloud
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3069/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: mariadb:10.11
    container_name: project-s-nextcloud-db
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    restart: always
    volumes:
      - ./data/nextcloud/db:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
    deploy:
      resources:
        limits:
          memory: 512m

  nextcloud:
    image: nextcloud:30
    container_name: project-s-nextcloud
    restart: always
    ports:
      - '8081:80'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/nextcloud/html:/var/www/html
      - ./data/nextcloud/data:/var/www/nextcloud_data
      - ./config/nextcloud/setup-office.sh:/docker-entrypoint-hooks.d/before-starting/setup-office.sh:ro
      - ./config/nextcloud/setup-office-post-install.sh:/docker-entrypoint-hooks.d/post-installation/setup-office-post-install.sh:ro
    environment:
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_HOST=db
      - NEXTCLOUD_TRUSTED_DOMAINS=localhost 127.0.0.1 ${HOMEFORGE_LAN_IP:-}
      - OVERWRITEHOST=${HOMEFORGE_LAN_IP:-localhost}:8081
      - OVERWRITEPROTOCOL=http
      - NEXTCLOUD_DATA_DIR=/var/www/nextcloud_data
      - NEXTCLOUD_INIT_HTACCESS=true
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - HOMEFORGE_LAN_IP=${HOMEFORGE_LAN_IP:-localhost}
    depends_on:
      db:
        condition: service_started
      collabora:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  collabora:
    image: collabora/code:24.04.10.2.1
    container_name: project-s-collabora
    restart: unless-stopped
    ports:
      - '9980:9980'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config/collabora/coolwsd-override.xml:/etc/coolwsd/coolwsd.d/homeforge-wopi.xml:ro
    environment:
      # Only the Docker-internal hostname needed — Collabora callbacks use
      # wopi_callback_url (set in Nextcloud via occ) instead of the browser's WOPISrc.
      - aliasgroup1=http://nextcloud:80
      - server_name=${HOMEFORGE_LAN_IP:-192.168.178.108}:9980
      - dictionaries=en_US
      - username=${COLLABORA_USERNAME}
      - password=${COLLABORA_PASSWORD}
      - extra_params=--o:ssl.enable=false --o:ssl.termination=false
    cap_add:
      - MKNOD
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
    deploy:
      resources:
        limits:
          memory: 1536m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9980/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  theia:
    image: ghcr.io/eclipse-theia/theia-ide/theia-ide:latest  # Theia only publishes :latest on GHCR
    container_name: project-s-theia
    # Theia requires root + privileged for Docker integration features
    # (container management, terminal with Docker access)
    user: root
    privileged: true
    ports:
      - '3030:3000'
    volumes:
      - ./data/workspace:/home/project/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SHELL=/bin/bash
    restart: 'unless-stopped'
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  synapse-db:
    image: postgres:16-alpine
    container_name: project-s-matrix-db
    environment:
      - POSTGRES_USER=${MATRIX_DB_USER}
      - POSTGRES_PASSWORD=${MATRIX_DB_PASSWORD}
      - POSTGRES_DB=${MATRIX_DB_NAME}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - ./data/matrix/db:/var/lib/postgresql/data
    restart: unless-stopped

  synapse:
    image: matrixdotorg/synapse:v1.120.0
    container_name: project-s-matrix-server
    depends_on:
      - synapse-db
    ports:
      - '8008:8008'
    volumes:
      - ./data/matrix/synapse:/data
      - ./config/matrix/homeserver.yaml:/data/homeserver.yaml:ro
      - ./config/matrix/localhost.log.config:/data/localhost.log.config:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  element:
    image: vectorim/element-web:v1.11.90
    container_name: project-s-matrix-client
    ports:
      - '8082:80'
    volumes:
      - ./config/matrix/element-config.json:/app/config.json:ro
    restart: unless-stopped

  vaultwarden:
    image: vaultwarden/server:1.32.7
    container_name: project-s-vaultwarden
    ports:
      - '8083:80'
    volumes:
      - ./data/vaultwarden:/data
    environment:
      - WEBSOCKET_ENABLED=true
      - DATA_FOLDER=/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/alive"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  open-webui:
    image: ghcr.io/open-webui/open-webui:0.6.5
    container_name: project-s-open-webui
    ports:
      - '8085:8080'
    volumes:
      - ./data/open-webui:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ollama:
    image: ollama/ollama:0.6.5
    container_name: project-s-ollama
    ports:
      - '11434:11434'
    volumes:
      - ./data/ollama:/root/.ollama
      - ./data/workspace:/workspace
      - ./config/ollama:/modelfiles:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:3.7.0
    container_name: project-s-kiwix-reader
    ports:
      - '8084:80'
    volumes:
      - ./data/kiwix:/data
    command: sh -c "kiwix-serve --port=80 *.zim || (echo 'No ZIM files found. Please add .zim files to ./data/kiwix' && sleep infinity)"
    restart: unless-stopped
