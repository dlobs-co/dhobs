server_name: "homeforge.local"
pid_file: /data/homeserver.pid
listeners:
  - port: 8008
    resources:
    - compress: false
      names:
      - client
      - federation
    tls: false
    type: http
    x_forwarded: true

database:
  name: psycopg2
  args:
    user: synapse
    password: synapse_password
    database: synapse
    host: synapse-db
    cp_min: 5
    cp_max: 10

log_config: "/data/homeforge.local.log.config"
media_store_path: /data/media_store
registration_shared_secret: "HomeForgeSecretRegistrationKey"
report_stats: false
macaroon_secret_key: "HomeForgeMacaroonSecretKey"
form_secret: "HomeForgeFormSecret"
signing_key_path: "/data/homeforge.local.signing.key"
trusted_key_servers:
  - server_name: "matrix.org"

enable_registration: true
enable_registration_without_verification: true
